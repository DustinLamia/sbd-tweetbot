<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SportsByDustin Tweet Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0D1B2A;
    --navy2: #0A2540;
    --teal:  #00B4A6;
    --teal2: #009E91;
    --white: #FFFFFF;
    --gray:  #94A3B8;
    --lgray: #1E2D3D;
    --red:   #EF4444;
    --green: #10B981;
    --font:  -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html, body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font);
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  /* ── Wrapper ── */
  .wrapper {
    width: 100%;
    max-width: 480px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .logo { display: flex; flex-direction: column; line-height: 1; }
  .logo-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--teal);
    letter-spacing: 2px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .live-badge {
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 4px;
    letter-spacing: 1px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

  /* ── Card ── */
  .card {
    background: var(--lgray);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid rgba(0,180,166,.15);
  }

  /* ── Label ── */
  .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gray);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed rgba(0,180,166,.4);
    border-radius: 14px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    padding: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--teal);
    background: rgba(0,180,166,.05);
  }
  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%; height: 100%;
  }
  .drop-icon { font-size: 40px; line-height: 1; }
  .drop-text { font-size: 17px; font-weight: 600; color: var(--white); }
  .drop-sub  { font-size: 13px; color: var(--gray); }

  /* ── Processing ── */
  .processing {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 32px 0;
    text-align: center;
  }
  .spinner-ring {
    width: 44px; height: 44px;
    border: 3px solid rgba(0,180,166,.2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-step { font-size: 15px; font-weight: 600; color: var(--gray); }

  /* ── Preview ── */
  .preview { display: none; }
  .preview-img-wrap {
    width: 100%;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
    background: var(--navy2);
    border: 1px solid rgba(0,180,166,.15);
  }
  .preview-img-wrap img {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--navy2);
    border: 1px solid rgba(0,180,166,.3);
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-family: var(--font);
    color: var(--white);
    resize: vertical;
    min-height: 110px;
    line-height: 1.5;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--teal); }

  .char-bar { text-align: right; margin-top: 6px; margin-bottom: 16px; }
  .char-count { font-size: 12px; color: var(--gray); }
  .char-count.warn { color: #F59E0B; }
  .char-count.over { color: var(--red); }

  /* ── Buttons ── */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    font-family: var(--font);
  }
  .btn:active { transform: scale(.97); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-tweet { background: var(--teal); color: #fff; }
  .btn-tweet:hover:not(:disabled) { background: var(--teal2); }
  .btn-ghost {
    background: transparent;
    color: var(--gray);
    border: 1px solid rgba(148,163,184,.25);
    margin-top: 10px;
    font-size: 14px;
    padding: 12px;
  }
  .btn-ghost:hover { color: var(--white); }

  /* ── Success ── */
  .success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 20px 0;
    text-align: center;
  }
  .success-checkmark {
    width: 64px; height: 64px;
    background: rgba(16,185,129,.1);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: var(--green);
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--teal);
  }
  .success-meta { font-size: 14px; color: var(--gray); }
  .success-tweet-preview {
    background: var(--navy2);
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    color: #CBD5E1;
    line-height: 1.5;
    text-align: left;
    width: 100%;
    white-space: pre-wrap;
    border: 1px solid rgba(0,180,166,.2);
  }

  /* ── Notices ── */
  .notice {
    width: 100%;
    max-width: 480px;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 12px;
    display: none;
  }
  .notice.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: #FCA5A5; }
  .notice.info  { background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.3); color: #6EE7B7; }

  /* ── Settings overlay ── */
  .settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .settings-overlay.open { display: flex; }
  .settings-panel {
    background: var(--lgray);
    border: 1px solid rgba(0,180,166,.2);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    margin-top: 20px;
  }
  .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .settings-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--teal); }
  .close-btn { background: none; border: none; color: var(--gray); font-size: 20px; cursor: pointer; }
  .settings-section { margin-bottom: 20px; }
  .settings-section-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--teal); margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); letter-spacing: .5px; margin-bottom: 5px; }
  .field input { width: 100%; background: var(--navy2); border: 1px solid rgba(0,180,166,.3); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: var(--font); color: var(--white); outline: none; }
  .field input:focus { border-color: var(--teal); }
  .save-settings-btn { width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; font-family: var(--font); cursor: pointer; }
  .save-settings-btn:hover { background: var(--teal2); }
  .setup-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #FCD34D; margin-bottom: 16px; display: none; }

  /* ── Spinner in button ── */
  .btn-spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--lgray); border-radius: 3px; }
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const TWITCH_URL = 'Twitch.tv/SportsByDustin';
const TWITTER_HANDLE = 'SportsByDustin';

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let currentFile = null;
let currentDataUrl = null;
let currentBase64 = null;
let currentMime = null;

// ══════════════════════════════════════════════════════════════
// SETTINGS — stored in localStorage
// ══════════════════════════════════════════════════════════════
const KEYS = {
  gemini:       'sbd_gemini_key',
  apiKey:       'sbd_tw_api_key',
  apiSecret:    'sbd_tw_api_secret',
  accessToken:  'sbd_tw_access_token',
  accessSecret: 'sbd_tw_access_secret',
};

// All keys hardcoded — no setup required
(function() {
  localStorage.setItem('sbd_gemini_key',        'AIzaSyA8rUf_7mdYcombKtbvamTDchDoTVafQFU');
  localStorage.setItem('sbd_tw_api_key',        'u5y0GXfLHjZyZFXaXoa6bBNjF');
  localStorage.setItem('sbd_tw_api_secret',     '1cNfr5y5HQi10PSrIXXGOJiOJung5Yh1daHnci4eobnI39EDqi');
  localStorage.setItem('sbd_tw_access_token',   '1284191658242965509-rzaiix4ex92vvYvejJEt18nCyt92r5');
  localStorage.setItem('sbd_tw_access_secret',  '6cxn609H7wwiTau9uGpANLqmA2usd965QXvoYQq99RyAK');
})();

function getKey(k)    { return localStorage.getItem(KEYS[k]) || ''; }
function setKey(k, v) { localStorage.setItem(KEYS[k], v); }

function hasAllKeys() {
  return getKey('gemini') && getKey('apiKey') && getKey('apiSecret')
      && getKey('accessToken') && getKey('accessSecret');
}

function openSettings() {
  document.getElementById('set_geminiKey').value    = getKey('gemini');
  document.getElementById('set_apiKey').value       = getKey('apiKey');
  document.getElementById('set_apiSecret').value    = getKey('apiSecret');
  document.getElementById('set_accessToken').value  = getKey('accessToken');
  document.getElementById('set_accessSecret').value = getKey('accessSecret');
  document.getElementById('setupWarning').style.display = hasAllKeys() ? 'none' : 'block';
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  setKey('gemini',       document.getElementById('set_geminiKey').value.trim());
  setKey('apiKey',       document.getElementById('set_apiKey').value.trim());
  setKey('apiSecret',    document.getElementById('set_apiSecret').value.trim());
  setKey('accessToken',  document.getElementById('set_accessToken').value.trim());
  setKey('accessSecret', document.getElementById('set_accessSecret').value.trim());
  closeSettings();
  showInfo('✅ Keys saved. You\'re all set!');
}



// ══════════════════════════════════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════════════════════════════════
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleFile(f);
  else showError('Please drop an image file.');
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
});

// ══════════════════════════════════════════════════════════════
// IMAGE HANDLING
// ══════════════════════════════════════════════════════════════
async function normalizeImage(file) {
  const MAX = 1280;
  return new Promise((resolve, reject) => {
    // First read as data URL so it works from local file:// context too
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('FileReader failed to read image'));
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) {
          if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
          else        { w = Math.round(w * MAX / h); h = MAX; }
        }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        c.toBlob(blob => {
          if (!blob) { reject(new Error('Canvas toBlob failed — try a JPEG or PNG')); return; }
          resolve(new File([blob], 'screenshot.jpg', { type: 'image/jpeg' }));
        }, 'image/jpeg', 0.85);
      };
      img.onerror = () => reject(new Error('Image failed to load — make sure it is a JPEG, PNG, or WebP'));
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function readDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function handleFile(rawFile) {
  if (!hasAllKeys()) {
    showError('⚙️ API keys not configured.');
    return;
  }
  clearNotices();
  showScreen('processing');
  setProcessingStep('Preparing image…');

  try {
    const file = await normalizeImage(rawFile);
    currentFile = file;
    currentDataUrl = await readDataUrl(file);
    currentMime = 'image/jpeg';
    // Extract base64 from data URL
    currentBase64 = currentDataUrl.split(',')[1];

    setProcessingStep('Gemini is reading your screenshot…');
    const tweet = await analyzeWithGemini(currentBase64, currentMime);

    document.getElementById('previewImage').src = currentDataUrl;
    document.getElementById('tweetText').value = tweet;
    updateCharCount();
    showScreen('preview');
  } catch (err) {
    showScreen('drop');
    showError('❌ ' + err.message);
  }
}

// ══════════════════════════════════════════════════════════════
// GEMINI VISION
// ══════════════════════════════════════════════════════════════
async function analyzeWithGemini(base64, mimeType) {
  const key = getKey('gemini');
  if (!key) throw new Error('Gemini API key not configured.');

  const prompt = `You are the social media manager for @SportsByDustin, a sports content creator on Twitch.

A screenshot was just taken during a LIVE stream at ${TWITCH_URL}.

Analyze what's in the image and write a tweet to post immediately. Follow these rules exactly:

WHAT TO DETECT:
- If it's a BET SLIP: identify the sportsbook platform (DraftKings, FanDuel, BetMGM, PrizePicks, Caesars, Underdog, DraftKings Pick6, Sleeper, ReBet, Onyx, Betr, or "Slip" if unclear), the sport (NBA, NFL, MLB, NHL, NCAAB, NCAAF, Golf, etc.), and whether it's a big parlay/nuke (many legs or huge payout).
- If it's a GAME RESULT / SCORE: describe the outcome concisely.
- If it's a HIGHLIGHT or anything else: describe it hype/excitedly.

TWEET FORMAT:
For bet slips:
  [Platform] [Sport] slip built live on stream 🎯
  (If it's a big nuke parlay → use 🚀 and say "NUKE" instead of "slip")

For game results/scores:
  Quick hype reaction to the result (1-2 lines max)

For anything else:
  Short exciting reaction (1-2 lines max)

Always end with a blank line then:
LIVE NOW: ${TWITCH_URL}

RULES:
- Under 240 characters total (leave room for the image attachment)
- No hashtags
- No quotes around the output
- No markdown
- Output ONLY the tweet text, nothing else`;

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: mimeType, data: base64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { maxOutputTokens: 120, temperature: 0.7 }
      })
    }
  );

  let respText;
  try { respText = await resp.text(); } catch(e) { throw new Error('Could not read Gemini response: ' + e.message); }

  if (!resp.ok) {
    let detail = respText;
    try { const j = JSON.parse(respText); detail = j?.error?.message || respText; } catch {}
    throw new Error(`Gemini ${resp.status}: ${detail}`);
  }

  let json;
  try { json = JSON.parse(respText); } catch(e) { throw new Error('Gemini response not valid JSON: ' + respText.slice(0,200)); }

  const text = json?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) {
    const reason = json?.candidates?.[0]?.finishReason || JSON.stringify(json).slice(0,300);
    throw new Error('Gemini returned no text. Reason: ' + reason);
  }
  return text.trim();
}

// ══════════════════════════════════════════════════════════════
// TWITTER API v2 — OAuth 1.0a (tweet with image)
// ══════════════════════════════════════════════════════════════

// OAuth 1.0a signature helper — works entirely in-browser
async function oauthSign(method, url, params, consumerKey, consumerSecret, tokenKey, tokenSecret) {
  const nonce = btoa(Array.from(crypto.getRandomValues(new Uint8Array(32)), b => String.fromCharCode(b)).join('')).replace(/[^a-zA-Z0-9]/g, '').slice(0, 32);
  const timestamp = Math.floor(Date.now() / 1000).toString();

  const oauthParams = {
    oauth_consumer_key:     consumerKey,
    oauth_nonce:            nonce,
    oauth_signature_method: 'HMAC-SHA256',
    oauth_timestamp:        timestamp,
    oauth_token:            tokenKey,
    oauth_version:          '1.0',
  };

  const allParams = { ...params, ...oauthParams };
  const sortedKeys = Object.keys(allParams).sort();
  const paramStr = sortedKeys.map(k => `${pct(k)}=${pct(allParams[k])}`).join('&');
  const baseStr = `${method.toUpperCase()}&${pct(url)}&${pct(paramStr)}`;
  const signingKey = `${pct(consumerSecret)}&${pct(tokenSecret)}`;

  // HMAC-SHA256 using Web Crypto
  const enc = new TextEncoder();
  const cryptoKey = await crypto.subtle.importKey(
    'raw', enc.encode(signingKey), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
  );
  const sigBuf  = await crypto.subtle.sign('HMAC', cryptoKey, enc.encode(baseStr));
  const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf)));

  oauthParams.oauth_signature = sig;

  const headerParts = Object.keys(oauthParams).sort().map(
    k => `${pct(k)}="${pct(oauthParams[k])}"`
  );
  return 'OAuth ' + headerParts.join(', ');
}

function pct(s) { return encodeURIComponent(String(s)); }

// Upload media to Twitter v1.1 (base64 INIT+APPEND+FINALIZE)
async function uploadMediaToTwitter(base64Data, mimeType) {
  const ck = getKey('apiKey');
  const cs = getKey('apiSecret');
  const at = getKey('accessToken');
  const as = getKey('accessSecret');

  const mediaBytes = atob(base64Data);
  const totalBytes = mediaBytes.length;

  // INIT
  const initUrl = 'https://upload.twitter.com/1.1/media/upload.json';
  const initParams = { command: 'INIT', media_type: mimeType, total_bytes: String(totalBytes), media_category: 'tweet_image' };
  const initAuth = await oauthSign('POST', initUrl, initParams, ck, cs, at, as);

  const initBody = new URLSearchParams(initParams);
  const initResp = await fetch(initUrl, {
    method: 'POST',
    headers: { Authorization: initAuth, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: initBody.toString()
  });
  if (!initResp.ok) {
    const t = await initResp.text();
    throw new Error(`Twitter media INIT failed (${initResp.status}): ${t}`);
  }
  const initJson = await initResp.json();
  const mediaId = initJson.media_id_string;

  // APPEND (single chunk — image is already compressed to ≤1MB)
  const appendUrl = 'https://upload.twitter.com/1.1/media/upload.json';
  const appendOauthParams = {
    oauth_consumer_key:     ck,
    oauth_nonce:            btoa(Array.from(crypto.getRandomValues(new Uint8Array(16)), b => String.fromCharCode(b)).join('')).replace(/[^a-z0-9]/gi,'').slice(0,32),
    oauth_signature_method: 'HMAC-SHA256',
    oauth_timestamp:        Math.floor(Date.now()/1000).toString(),
    oauth_token:            at,
    oauth_version:          '1.0'
  };

  // Sign only the non-multipart params for APPEND
  const appendSignParams = { command: 'APPEND', media_id: mediaId, segment_index: '0', ...appendOauthParams };
  const appendSortedKeys = Object.keys(appendSignParams).sort();
  const appendParamStr = appendSortedKeys.map(k => `${pct(k)}=${pct(appendSignParams[k])}`).join('&');
  const appendBase = `POST&${pct(appendUrl)}&${pct(appendParamStr)}`;
  const appendSignKey = `${pct(cs)}&${pct(as)}`;
  const enc = new TextEncoder();
  const appendCryptoKey = await crypto.subtle.importKey('raw', enc.encode(appendSignKey), { name:'HMAC',hash:'SHA-256' }, false, ['sign']);
  const appendSigBuf = await crypto.subtle.sign('HMAC', appendCryptoKey, enc.encode(appendBase));
  appendOauthParams.oauth_signature = btoa(String.fromCharCode(...new Uint8Array(appendSigBuf)));

  const appendAuthHeader = 'OAuth ' + Object.keys(appendOauthParams).sort().map(k => `${pct(k)}="${pct(appendOauthParams[k])}"`).join(', ');

  const appendForm = new FormData();
  appendForm.append('command', 'APPEND');
  appendForm.append('media_id', mediaId);
  appendForm.append('segment_index', '0');
  appendForm.append('media_data', base64Data);

  const appendResp = await fetch(appendUrl, {
    method: 'POST',
    headers: { Authorization: appendAuthHeader },
    body: appendForm
  });
  if (!appendResp.ok && appendResp.status !== 204) {
    const t = await appendResp.text();
    throw new Error(`Twitter media APPEND failed (${appendResp.status}): ${t}`);
  }

  // FINALIZE
  const finalizeParams = { command: 'FINALIZE', media_id: mediaId };
  const finalizeAuth = await oauthSign('POST', appendUrl, finalizeParams, ck, cs, at, as);
  const finalizeResp = await fetch(appendUrl, {
    method: 'POST',
    headers: { Authorization: finalizeAuth, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(finalizeParams).toString()
  });
  if (!finalizeResp.ok) {
    const t = await finalizeResp.text();
    throw new Error(`Twitter media FINALIZE failed (${finalizeResp.status}): ${t}`);
  }

  return mediaId;
}

// Post tweet v2
async function postTweetToTwitter(text, mediaId) {
  const ck = getKey('apiKey');
  const cs = getKey('apiSecret');
  const at = getKey('accessToken');
  const as = getKey('accessSecret');

  const tweetUrl = 'https://api.twitter.com/2/tweets';
  const auth = await oauthSign('POST', tweetUrl, {}, ck, cs, at, as);

  const body = { text };
  if (mediaId) body.media = { media_ids: [mediaId] };

  const resp = await fetch(tweetUrl, {
    method: 'POST',
    headers: { Authorization: auth, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const t = await resp.text();
    throw new Error(`Twitter post failed (${resp.status}): ${t}`);
  }
  return await resp.json();
}

// ══════════════════════════════════════════════════════════════
// POST FLOW
// ══════════════════════════════════════════════════════════════
async function postTweet() {
  const text = document.getElementById('tweetText').value.trim();
  if (!text) { showError('Tweet text is empty.'); return; }
  if (text.length > 280) { showError('Tweet exceeds 280 characters.'); return; }

  const btn = document.getElementById('postBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="btn-spinner"></div> Posting to Twitter…';
  clearNotices();

  try {
    setProcessingStep('Uploading image to Twitter…');
    // Show subtle loading in preview, not full screen
    let mediaId = null;
    if (currentBase64) {
      mediaId = await uploadMediaToTwitter(currentBase64, currentMime);
    }

    setProcessingStep('Sending tweet…');
    await postTweetToTwitter(text, mediaId);

    document.getElementById('postedTweetText').textContent = text;
    showScreen('success');
  } catch (err) {
    showError('❌ ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<span>🐦</span> Post to @SportsByDustin Now';
  }
}

// ══════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════
function showScreen(screen) {
  document.getElementById('dropZone').style.display    = screen === 'drop'       ? 'flex'  : 'none';
  document.getElementById('processing').style.display  = screen === 'processing' ? 'flex'  : 'none';
  document.getElementById('preview').style.display     = screen === 'preview'    ? 'block' : 'none';
  document.getElementById('success').style.display     = screen === 'success'    ? 'flex'  : 'none';
}

function setProcessingStep(msg) {
  document.getElementById('processingStep').textContent = msg;
}

function resetFlow() {
  currentFile = null; currentDataUrl = null; currentBase64 = null; currentMime = null;
  fileInput.value = '';
  document.getElementById('tweetText').value = '';
  document.getElementById('postBtn').disabled = false;
  document.getElementById('postBtn').innerHTML = '<span>🐦</span> Post to @SportsByDustin Now';
  updateCharCount();
  clearNotices();
  showScreen('drop');
}

document.getElementById('tweetText').addEventListener('input', updateCharCount);
function updateCharCount() {
  const len = document.getElementById('tweetText').value.length;
  const el = document.getElementById('charCount');
  el.textContent = `${len} / 280`;
  el.className = 'char-count' + (len > 280 ? ' over' : len > 240 ? ' warn' : '');
}

function showError(msg) {
  const el = document.getElementById('errorBar');
  el.textContent = msg;
  el.style.display = 'block';
}
function showInfo(msg) {
  const el = document.getElementById('infoBar');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3000);
}
function clearNotices() {
  document.getElementById('errorBar').style.display = 'none';
  document.getElementById('infoBar').style.display = 'none';
}

// Close overlay on outside click
document.getElementById('settingsOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

showScreen('drop');
